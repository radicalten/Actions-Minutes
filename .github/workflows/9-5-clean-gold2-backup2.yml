name: NooDS-Wii
on:
  push:
    branches:
    - main
jobs:
  build-wii:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Compile
      run: |
        make -f Makefile-noods-wii-9-5-clean-gold2-backup2
    - name: Upload
      uses: actions/upload-artifact@v6
      with:
        name: NooDS-Wii
        path: |
          *.dol
